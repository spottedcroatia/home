<!DOCTYPE html>
<html lang="hr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5FQ7GTQQ');</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotted Croatia | Pronađi osobu koja ti je zapela za oko!</title>
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <link rel="icon" href="https://fav.farm/❤️">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUWCPiZQX9Evpkith3oKrI3yvb_x5aubw",
            authDomain: "spotted-croatia.firebaseapp.com",
            projectId: "spotted-croatia",
            storageBucket: "spotted-croatia.firebasestorage.app",
            messagingSenderId: "344590523147",
            appId: "1:344590523147:web:c9c8eaa976f386a384600e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'project-344590523147'; 
        const ADMIN_EMAILS = ['spottedcroatiadevs@gmail.com', 'reeshof5047@gmail.com']; 
        const GRADOVI = ['Split', 'Zagreb', 'Zadar', 'Dubrovnik', 'Šibenik', 'Slavonski Brod', 'Pula', 'Rijeka', 'Osijek', 'Varaždin', 'Karlovac', 'Ostalo'];

        let currentUser = null;
        let isAdmin = false;
        let allPostsCached = [];
        let logoClicks = 0;
        let showAdminView = false;
        let captchaWidgetId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            isAdmin = user && user.email && ADMIN_EMAILS.includes(user.email);
            if (!user) {
                signInAnonymously(auth);
            }
            renderUI();
            listenForPosts();
        });

        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'posts');

        function listenForPosts() {
            onSnapshot(getCollectionRef(), (snap) => {
                allPostsCached = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                updateDisplay();
            });
        }

        // --- ADMIN FUNKCIJE ---

        window.handleLogoClick = () => {
            logoClicks++;
            if (logoClicks >= 5) {
                logoClicks = 0;
                if (isAdmin) {
                    showAdminView = !showAdminView;
                    renderUI();
                    updateDisplay();
                } else {
                    const provider = new GoogleAuthProvider();
                    signInWithPopup(auth, provider).catch(err => console.error("Login failed", err));
                }
            }
        };

        window.approvePost = async (id) => {
            await updateDoc(doc(getCollectionRef(), id), { status: 'approved' });
            notify("Objava odobrena!");
        };

        window.deletePost = async (id) => {
            if(confirm("Sigurno želiš obrisati?")) {
                await deleteDoc(doc(getCollectionRef(), id));
                notify("Objava obrisana.");
            }
        };

        window.logout = () => {
            signOut(auth);
            showAdminView = false;
            location.reload();
        };

        // --- KORISNIČKE FUNKCIJE ---

        window.toggleForm = () => {
            const f = document.getElementById('form-container');
            const b = document.getElementById('toggle-btn');
            f.classList.toggle('hidden');
            
            if (!f.classList.contains('hidden')) {
                setTimeout(() => {
                    const container = document.getElementById('recaptcha-container');
                    if (container) {
                        container.innerHTML = "";
                        captchaWidgetId = grecaptcha.render('recaptcha-container', {
                            'sitekey': '6Legi88sAAAAAOJj1zvesrRPas1wutu4-LQ6BRp9',
                            'theme': 'dark'
                        });
                    }
                }, 200);
            }
            b.innerText = f.classList.contains('hidden') ? "Objavi" : "Zatvori";
        };

        window.handlePostSubmit = async (e) => {
            e.preventDefault();
            const response = grecaptcha.getResponse(captchaWidgetId);
            if (!response) { alert("Potvrdite da niste robot!"); return; }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = "Slanje...";
            
            try {
                await addDoc(getCollectionRef(), {
                    text: document.getElementById('txt-desc').value,
                    grad: document.getElementById('sel-grad').value,
                    location: document.getElementById('txt-loc').value,
                    contact: document.getElementById('txt-contact').value,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                e.target.reset();
                grecaptcha.reset(captchaWidgetId);
                notify("Poslano na pregled! ✨");
                window.toggleForm();
            } catch (err) { notify("Greška pri slanju."); }
            finally { btn.disabled = false; btn.innerText = "Pošalji na pregled"; }
        };

        window.updateDisplay = () => {
            const container = document.getElementById('feed');
            if (!container) return;

            if (showAdminView && isAdmin) {
                const pending = allPostsCached.filter(p => p.status === 'pending');
                container.innerHTML = `
                    <div class="mb-8 flex justify-between items-center">
                        <h2 class="text-xl font-bold text-rose-500 underline">Admin Panel (Čekanje)</h2>
                        <button onclick="logout()" class="text-[10px] bg-white/10 px-3 py-1 rounded">Odjava</button>
                    </div>
                ` + pending.map(p => `
                    <div class="card p-6 mb-4 bg-white/5 border-rose-500/30">
                        <p class="mb-4">"${p.text}"</p>
                        <div class="flex gap-2">
                            <button onclick="approvePost('${p.id}')" class="bg-green-600 px-4 py-2 rounded-full text-[10px] font-bold">ODOBRI</button>
                            <button onclick="deletePost('${p.id}')" class="bg-red-600 px-4 py-2 rounded-full text-[10px] font-bold">OBRIŠI</button>
                        </div>
                    </div>
                `).join('') || '<div class="text-center py-20 opacity-20">Nema objava na čekanju.</div>';
            } else {
                const approved = allPostsCached.filter(p => p.status === 'approved');
                container.innerHTML = approved.map(p => `
                    <div class="card p-7 mb-6 animate-slide-up bg-white/5 border-white/10">
                        <div class="flex justify-between mb-4">
                            <span class="tag">#Spotted - ${p.grad}</span>
                            <span class="text-[9px] text-white/30">${p.timestamp ? new Date(p.timestamp.seconds * 1000).toLocaleString() : ''}</span>
                        </div>
                        <p class="text-lg mb-4">"${p.text}"</p>
                        <div class="text-[10px] text-white/50 uppercase font-bold tracking-widest flex justify-between">
                            <span>📍 ${p.location}</span>
                            ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="text-rose-500">OBRIŠI</button>` : ''}
                        </div>
                    </div>
                `).join('') || '<div class="text-center py-20 opacity-20">Nema objava...</div>';
            }
        };

        function renderUI() {
            document.getElementById('root').innerHTML = `
                <div class="min-h-screen text-white pb-20">
                    <nav class="h-16 border-b border-white/5 flex items-center px-6 sticky top-0 bg-black/50 backdrop-blur-xl z-50">
                        <h1 onclick="handleLogoClick()" class="text-lg font-black tracking-tighter cursor-pointer select-none">
                            SPOTTED<span class="text-rose-600">.</span>hr
                        </h1>
                    </nav>

                    <main class="max-w-xl mx-auto px-6 pt-12">
                        ${!showAdminView ? `
                        <div class="flex flex-col items-center mb-12">
                            <button id="toggle-btn" onclick="toggleForm()" class="bg-white text-black font-black py-4 px-14 rounded-full uppercase tracking-widest text-[10px]">Objavi</button>
                            <div id="form-container" class="hidden w-full mt-8 card p-8 bg-white/5 border-white/10">
                                <form onsubmit="handlePostSubmit(event)" class="space-y-6">
                                    <textarea id="txt-desc" placeholder="Koga tražiš?" class="input min-h-[100px]" required></textarea>
                                    <div class="grid grid-cols-2 gap-4">
                                        <select id="sel-grad" class="input">${GRADOVI.map(g => `<option value="${g}">${g}</option>`).join('')}</select>
                                        <input id="txt-loc" type="text" placeholder="Gdje?" class="input" required>
                                    </div>
                                    <input id="txt-contact" type="text" placeholder="Kontakt (opcionalno)" class="input">
                                    <div class="flex justify-center" id="recaptcha-container"></div>
                                    <button type="submit" class="w-full bg-rose-600 py-4 rounded-full font-black uppercase text-[10px]">Pošalji na pregled</button>
                                </form>
                            </div>
                        </div>
                        ` : `
                        <div class="mb-6 text-center">
                            <button onclick="handleLogoClick()" class="text-[10px] text-white/50 underline">Povratak na feed</button>
                        </div>
                        `}
                        <div id="feed"></div>
                    </main>
                    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-4 rounded-full text-[10px] font-black opacity-0 transition-all z-[100]"></div>
                </div>`;
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        window.onload = renderUI;
    </script>

    <style>
        body { background: #050505; font-family: sans-serif; }
        .card { border-radius: 2rem; border: 1px solid rgba(255,255,255,0.1); }
        .input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; color: white; }
        .tag { font-size: 8px; background: rgba(225,29,72,0.2); color: #fb7185; padding: 4px 10px; border-radius: 99px; font-weight: 800; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.5s ease forwards; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
