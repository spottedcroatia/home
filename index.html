<!DOCTYPE html>
<html lang="hr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5FQ7GTQQ');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotted Croatia</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/hearts.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/hearts.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const _part1 = "AIzaSyDUWCPiZQX";
        const _part2 = "9Evpkith3oKrI3yvb_x5aubw";

        const firebaseConfig = {
            apiKey: _part1 + _part2,
            authDomain: "spotted-croatia.firebaseapp.com",
            projectId: "spotted-croatia",
            storageBucket: "spotted-croatia.firebasestorage.app",
            messagingSenderId: "344590523147",
            appId: "1:344590523147:web:c9c8eaa976f386a384600e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'project-344590523147'; 
        const ADMIN_EMAILS = ['spottedcroatiadevs@gmail.com', 'reeshof5047@gmail.com']; 
        const GRADOVI = ['Split', 'Zagreb', 'Zadar', 'Dubrovnik', 'Šibenik', 'Slavonski Brod', 'Pula', 'Rijeka', 'Osijek', 'Varaždin', 'Karlovac', 'Ostalo'];

        let currentUser = null;
        let isAdmin = false;
        let allPostsCached = [];
        let activeFilter = null;
        let captchaWidgetId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                isAdmin = user.email && ADMIN_EMAILS.includes(user.email);
                renderUI();
                listenForPosts();
            } else {
                signInAnonymously(auth);
            }
        });

        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'posts');

        function listenForPosts() {
            onSnapshot(getCollectionRef(), (snap) => {
                allPostsCached = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                updateDisplay();
            });
        }

        function getTimeStyles(ts) {
            if (!ts) return "from-slate-900 to-black border-white/5";
            const hour = new Date(ts.seconds * 1000).getHours();
            if (hour >= 5 && hour < 10) return "from-orange-500/10 to-transparent border-orange-500/20";
            if (hour >= 10 && hour < 17) return "from-blue-500/10 to-transparent border-blue-400/20";
            if (hour >= 17 && hour < 21) return "from-indigo-600/20 to-transparent border-indigo-400/20";
            return "from-slate-900 via-blue-900/10 to-transparent border-blue-900/30";
        }

        function formatDate(ts) {
            if (!ts) return 'Sada';
            const date = new Date(ts.seconds * 1000);
            return date.toLocaleString('hr-HR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function renderFeed(posts) {
            const container = document.getElementById('feed');
            if (!container) return;
            container.innerHTML = posts.map(p => {
                const timeStyles = getTimeStyles(p.timestamp);
                return `
                <div class="card p-4 md:p-6 mb-4 animate-slide-up relative bg-gradient-to-br ${timeStyles}">
                    ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="absolute -top-2 -right-2 bg-rose-600 text-white text-[10px] font-black w-6 h-6 rounded-full z-20 shadow-lg">X</button>` : ''}
                    
                    <div class="flex flex-wrap items-center gap-x-2 gap-y-1 mb-4">
                        <button onclick="setFilter('${p.grad}')" class="bg-white/10 border border-white/10 px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-wider">
                            ${p.grad}
                        </button>
                        <span class="text-white/40 font-bold text-[10px] uppercase tracking-tight truncate flex-1">
                            @ ${p.location}
                        </span>
                        <span class="text-[8px] text-white/30 font-mono">${formatDate(p.timestamp)}</span>
                    </div>

                    <p class="text-white/95 font-medium text-[15px] md:text-lg leading-relaxed mb-4">"${p.text}"</p>
                    
                    ${p.contact ? `
                        <div class="pt-3 border-t border-white/5 flex items-center text-[10px] text-emerald-400 font-bold tracking-tight">
                            <svg class="w-3.5 h-3.5 mr-2 opacity-80" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            <span class="truncate">${p.contact}</span>
                        </div>
                    ` : ''}
                </div>`;
            }).join('') || `<div class="text-center py-20 text-white/10 text-[10px] font-black uppercase tracking-[0.3em]">Nema objava</div>`;
        }

        window.updateDisplay = () => {
            const approved = allPostsCached.filter(p => p.status === 'approved');
            const pending = allPostsCached.filter(p => p.status === 'pending');
            const toShow = activeFilter ? approved.filter(p => p.grad === activeFilter) : approved;
            renderFeed(toShow);
            if (isAdmin) renderAdminPanel(pending);
            updateFilterUI();
        };

        window.setFilter = (grad) => {
            activeFilter = grad;
            window.updateDisplay();
            if (grad) window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function updateFilterUI() {
            const info = document.getElementById('active-filter-info');
            if (info) info.innerHTML = activeFilter ? `<button onclick="setFilter(null)" class="ml-2 bg-rose-600 text-[8px] px-2 py-0.5 rounded font-black">PONIŠTI ${activeFilter}</button>` : '';
        }

        window.toggleForm = () => {
            const f = document.getElementById('form-container');
            const b = document.getElementById('toggle-btn');
            const isHidden = f.classList.contains('hidden');
            f.classList.toggle('hidden');
            b.innerText = isHidden ? "Zatvori" : "Objavi";
            if (isHidden) {
                setTimeout(() => {
                    if (document.getElementById('recaptcha-element').innerHTML === "") {
                        captchaWidgetId = grecaptcha.render('recaptcha-element', { 'sitekey': '6Legi88sAAAAAOJj1zvesrRPas1wutu4-LQ6BRp9', 'theme': 'dark' });
                    }
                }, 100);
            }
        };

        window.handlePostSubmit = async (e) => {
            e.preventDefault();
            const captchaResponse = grecaptcha.getResponse(captchaWidgetId);
            if (!captchaResponse) { notify("Dokaži da si čovjek."); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerText = "Slanje...";
            try {
                await addDoc(getCollectionRef(), {
                    text: document.getElementById('txt-desc').value,
                    grad: document.getElementById('sel-grad').value,
                    location: document.getElementById('txt-loc').value,
                    contact: document.getElementById('txt-contact').value,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                e.target.reset(); grecaptcha.reset(captchaWidgetId);
                notify("Poslano! ✨"); window.toggleForm();
            } catch (err) { notify("Greška."); } finally { btn.disabled = false; btn.innerText = "Pošalji"; }
        };

        window.deletePost = async (id) => {
            if(confirm("Obriši?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id));
        };

        window.approvePost = async (id) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id), { status: 'approved' });
            notify("Odobreno.");
        };

        function renderAdminPanel(pending) {
            const container = document.getElementById('admin-queue');
            if (!container) return;
            container.innerHTML = pending.map(p => `
                <div class="bg-white/5 p-3 rounded-2xl mb-2 border border-white/10 text-[11px]">
                    <p class="mb-2 opacity-70 italic">"${p.text}"</p>
                    <div class="flex gap-2">
                        <button onclick="approvePost('${p.id}')" class="flex-1 bg-emerald-600 py-1.5 rounded-lg font-bold">ODOBRI</button>
                        <button onclick="deletePost('${p.id}')" class="bg-rose-600 px-3 py-1.5 rounded-lg">X</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-[9px] opacity-20">PRAZNO</p>';
        }

        function renderUI() {
            document.getElementById('root').innerHTML = `
                <div class="min-h-screen text-white pb-10">
                    <div class="gradient-bg"></div>
                    <nav class="fixed top-0 inset-x-0 h-14 bg-black/60 backdrop-blur-xl border-b border-white/5 z-50 flex items-center">
                        <div class="max-w-xl mx-auto px-4 w-full flex justify-between items-center">
                            <h1 onclick="triggerAdminLogin()" class="text-base font-black tracking-tighter cursor-pointer">SPOTTED<span class="text-rose-600">.</span>HR</h1>
                            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                        </div>
                    </nav>
                    <main class="relative max-w-xl mx-auto px-4 pt-20 z-10">
                        ${isAdmin ? `<section class="card p-4 mb-6 border-rose-500/30 bg-rose-500/10"><div id="admin-queue"></div></section>` : `
                            <div class="flex flex-col items-center mb-8">
                                <button id="toggle-btn" onclick="toggleForm()" class="bg-white text-black font-black py-3 px-10 rounded-full uppercase tracking-widest text-[10px] shadow-2xl">Objavi</button>
                                <div id="form-container" class="hidden w-full mt-4 card p-5 border-white/10 bg-black/80">
                                    <form onsubmit="handlePostSubmit(event)" class="space-y-4">
                                        <textarea id="txt-desc" placeholder="Koga tražiš? Opis..." class="input min-h-[100px]" required></textarea>
                                        <div class="grid grid-cols-2 gap-3">
                                            <select id="sel-grad" class="input">${GRADOVI.map(g => `<option value="${g}">${g}</option>`).join('')}</select>
                                            <input id="txt-loc" type="text" placeholder="Gdje točno?" class="input" required>
                                        </div>
                                        <input id="txt-contact" type="text" placeholder="Kontakt (opcionalno)" class="input">
                                        <div class="flex justify-center scale-90"><div id="recaptcha-element"></div></div>
                                        <button type="submit" class="w-full bg-rose-600 py-3 rounded-xl font-black text-[11px] uppercase tracking-widest">Pošalji</button>
                                    </form>
                                </div>
                            </div>
                        `}
                        <div id="feed-header" class="flex items-center gap-3 mb-6 opacity-40">
                            <div class="h-[1px] bg-white/20 flex-1"></div>
                            <span class="text-[8px] font-black uppercase tracking-[0.4em]">Najnovije</span>
                            <div id="active-filter-info"></div>
                            <div class="h-[1px] bg-white/20 flex-1"></div>
                        </div>
                        <div id="feed" class="flex flex-col"></div>
                    </main>
                    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full text-[10px] font-black opacity-0 translate-y-5 transition-all duration-300 z-[100] shadow-2xl"></div>
                </div>`;
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            if (!t) return; t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-5');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-5'), 2500);
        }

        let logoClicks = 0; let clickTimer = null;
        window.triggerAdminLogin = async () => {
            logoClicks++; clearTimeout(clickTimer);
            if (logoClicks >= 5) {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                if (!ADMIN_EMAILS.includes(result.user.email)) await signOut(auth);
            }
            clickTimer = setTimeout(() => { logoClicks = 0; }, 800);
        };

        window.onload = () => { renderUI(); };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; margin: 0; overflow-x: hidden; }
        .gradient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 70%); }
        .card { border-width: 1px; border-radius: 1.25rem; border-color: rgba(255,255,255,0.06); backdrop-filter: blur(10px); transition: 0.3s; }
        .input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 0.8rem 1rem; color: white; font-size: 13px; outline: none; }
        .input:focus { border-color: #e11d48; }
        .animate-slide-up { animation: slideUp 0.6s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body><div id="root"></div></body>
</html>
