<!DOCTYPE html>
<html lang="hr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5FQ7GTQQ');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotted Croatia</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/hearts.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/hearts.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const _part1 = "AIzaSyDUWCPiZQX";
        const _part2 = "9Evpkith3oKrI3yvb_x5aubw";

        const firebaseConfig = {
            apiKey: _part1 + _part2,
            authDomain: "spotted-croatia.firebaseapp.com",
            projectId: "spotted-croatia",
            storageBucket: "spotted-croatia.firebasestorage.app",
            messagingSenderId: "344590523147",
            appId: "1:344590523147:web:c9c8eaa976f386a384600e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'project-344590523147'; 
        const ADMIN_EMAILS = ['spottedcroatiadevs@gmail.com', 'reeshof5047@gmail.com']; 
        const GRADOVI = ['Split', 'Zagreb', 'Zadar', 'Dubrovnik', 'Šibenik', 'Slavonski Brod', 'Pula', 'Rijeka', 'Osijek', 'Varaždin', 'Karlovac', 'Ostalo'];

        let currentUser = null;
        let isAdmin = false;
        let allPostsCached = [];
        let activeFilter = null;
        let captchaWidgetId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                isAdmin = user.email && ADMIN_EMAILS.includes(user.email);
                renderUI();
                listenForPosts();
            } else {
                signInAnonymously(auth);
            }
        });

        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'posts');

        function listenForPosts() {
            onSnapshot(getCollectionRef(), (snap) => {
                allPostsCached = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                updateDisplay();
            });
        }

        function getTimeStyles(ts) {
            if (!ts) return "from-slate-900 to-black border-white/5";
            const hour = new Date(ts.seconds * 1000).getHours();
            if (hour >= 5 && hour < 10) return "from-orange-500/10 via-black to-black border-orange-500/20";
            if (hour >= 10 && hour < 17) return "from-blue-500/10 via-black to-black border-blue-400/20";
            if (hour >= 17 && hour < 21) return "from-indigo-600/15 via-black to-black border-indigo-400/20";
            return "from-slate-800/20 via-black to-black border-white/10";
        }

        function formatDate(ts) {
            if (!ts) return 'Sada';
            const date = new Date(ts.seconds * 1000);
            return date.toLocaleString('hr-HR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function renderFeed(posts) {
            const container = document.getElementById('feed');
            if (!container) return;
            container.innerHTML = posts.map(p => {
                const timeStyles = getTimeStyles(p.timestamp);
                return `
                <div class="card p-5 mb-4 animate-slide-up relative bg-gradient-to-br ${timeStyles}">
                    ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[10px] font-black w-7 h-7 rounded-full z-20 border-2 border-black shadow-lg">X</button>` : ''}
                    
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                        <div class="flex items-center gap-2 min-w-0">
                            <button onclick="setFilter('${p.grad}')" class="shrink-0 bg-white/10 hover:bg-rose-600 border border-white/10 px-2 py-1 rounded-md text-[9px] font-black uppercase tracking-wider transition-all text-white/90">
                                ${p.grad}
                            </button>
                            <span class="text-white/40 font-bold text-[10px] md:text-[11px] uppercase tracking-wide truncate italic">
                                @ ${p.location}
                            </span>
                        </div>
                        <span class="w-fit shrink-0 bg-white/5 text-white/40 px-2 py-0.5 rounded text-[9px] font-mono border border-white/5">
                            ${formatDate(p.timestamp)}
                        </span>
                    </div>

                    <div class="text-white/90 font-medium text-[14px] md:text-[16px] leading-relaxed tracking-tight break-words text-left whitespace-pre-wrap p-0 m-0">${p.text.trim()}</div>
                    
                    ${p.contact ? `
                        <div class="mt-5 pt-4 border-t border-white/5 flex items-center">
                            <div class="flex flex-col">
                                <span class="text-[8px] uppercase font-black tracking-widest text-white/30">Kontakt</span>
                                <span class="text-[12px] text-emerald-400 font-bold tracking-wide break-all">${p.contact}</span>
                            </div>
                        </div>
                    ` : ''}
                </div>`;
            }).join('') || `<div class="text-center py-20 text-white/10 text-[10px] font-black uppercase tracking-[0.4em]">Nema novih objava</div>`;
        }

        window.updateDisplay = () => {
            const approved = allPostsCached.filter(p => p.status === 'approved');
            const pending = allPostsCached.filter(p => p.status === 'pending');
            const toShow = activeFilter ? approved.filter(p => p.grad === activeFilter) : approved;
            renderFeed(toShow);
            if (isAdmin) renderAdminPanel(pending);
            updateFilterUI();
        };

        window.setFilter = (grad) => {
            activeFilter = grad;
            window.updateDisplay();
            if (grad) window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function updateFilterUI() {
            const info = document.getElementById('active-filter-info');
            if (info) info.innerHTML = activeFilter ? `<button onclick="setFilter(null)" class="ml-2 bg-rose-600 text-[9px] px-2 py-0.5 rounded-full font-black shadow-lg">UKLONI ${activeFilter}</button>` : '';
        }

        window.toggleForm = () => {
            const f = document.getElementById('form-container');
            const b = document.getElementById('toggle-btn');
            const isHidden = f.classList.contains('hidden');
            f.classList.toggle('hidden');
            b.innerText = isHidden ? "Zatvori" : "Objavi oglas";
            if (isHidden) {
                setTimeout(() => {
                    if (document.getElementById('recaptcha-element').innerHTML === "") {
                        captchaWidgetId = grecaptcha.render('recaptcha-element', { 'sitekey': '6Legi88sAAAAAOJj1zvesrRPas1wutu4-LQ6BRp9', 'theme': 'dark' });
                    }
                }, 100);
            }
        };

        window.handlePostSubmit = async (e) => {
            e.preventDefault();
            const captchaResponse = grecaptcha.getResponse(captchaWidgetId);
            if (!captchaResponse) { notify("Potvrdite reCAPTCHA."); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerText = "Slanje...";
            try {
                await addDoc(getCollectionRef(), {
                    text: document.getElementById('txt-desc').value,
                    grad: document.getElementById('sel-grad').value,
                    location: document.getElementById('txt-loc').value,
                    contact: document.getElementById('txt-contact').value,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                e.target.reset(); grecaptcha.reset(captchaWidgetId);
                notify("Poslano na pregled! ✨"); window.toggleForm();
            } catch (err) { notify("Došlo je do greške."); } finally { btn.disabled = false; btn.innerText = "Pošalji"; }
        };

        window.deletePost = async (id) => {
            if(confirm("Sigurno obrisati?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id));
        };

        window.approvePost = async (id) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id), { status: 'approved' });
            notify("Objava odobrena.");
        };

        function renderAdminPanel(pending) {
            const container = document.getElementById('admin-queue');
            if (!container) return;
            container.innerHTML = pending.map(p => `
                <div class="bg-white/5 p-4 rounded-xl mb-2 border border-rose-500/20 text-xs">
                    <p class="mb-3 opacity-90 italic">"${p.text}"</p>
                    <div class="flex gap-2">
                        <button onclick="approvePost('${p.id}')" class="flex-1 bg-emerald-600 py-2 rounded-lg font-black uppercase text-[10px]">Odobri</button>
                        <button onclick="deletePost('${p.id}')" class="bg-rose-600 px-4 py-2 rounded-lg font-black">X</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-[9px] opacity-30 py-2 font-bold">NEMA ČEKANJA</p>';
        }

        function renderUI() {
            document.getElementById('root').innerHTML = `
                <div class="min-h-screen text-white pb-20">
                    <div class="gradient-bg"></div>
                    <nav class="fixed top-0 inset-x-0 h-14 bg-black/80 backdrop-blur-2xl border-b border-white/10 z-50 flex items-center">
                        <div class="max-w-md mx-auto px-6 w-full flex justify-between items-center">
                            <h1 onclick="triggerAdminLogin()" class="text-lg font-black tracking-tighter cursor-pointer">SPOTTED<span class="text-rose-600">.</span>HR</h1>
                            <div class="flex items-center gap-2">
                                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                            </div>
                        </div>
                    </nav>
                    <main class="relative max-w-md mx-auto px-4 pt-20 z-10">
                        ${isAdmin ? `<section class="card p-5 mb-8 border-rose-500/30 bg-rose-500/10 shadow-2xl"><h2 class="text-[10px] font-black uppercase tracking-widest mb-3 text-rose-500">Moderacija</h2><div id="admin-queue"></div></section>` : `
                            <div class="flex flex-col items-center mb-8">
                                <button id="toggle-btn" onclick="toggleForm()" class="bg-white text-black font-extrabold py-3 px-10 rounded-full uppercase tracking-widest text-[10px] shadow-2xl hover:scale-105 active:scale-95 transition-all">Objavi oglas</button>
                                <div id="form-container" class="hidden w-full mt-4 card p-5 border-white/10 bg-black/90 shadow-2xl">
                                    <form onsubmit="handlePostSubmit(event)" class="space-y-4">
                                        <div class="space-y-1.5"><label class="text-[9px] font-black uppercase text-white/40 ml-2">Opis</label><textarea id="txt-desc" placeholder="Tko ti je zapeo za oko?" class="input min-h-[120px]" required></textarea></div>
                                        <div class="grid grid-cols-2 gap-3">
                                            <div class="space-y-1.5"><label class="text-[9px] font-black uppercase text-white/40 ml-2">Grad</label><select id="sel-grad" class="input py-2 text-xs">${GRADOVI.map(g => `<option value="${g}">${g}</option>`).join('')}</select></div>
                                            <div class="space-y-1.5"><label class="text-[9px] font-black uppercase text-white/40 ml-2">Lokacija</label><input id="txt-loc" type="text" placeholder="Gdje..." class="input py-2 text-xs" required></div>
                                        </div>
                                        <div class="space-y-1.5"><label class="text-[9px] font-black uppercase text-white/40 ml-2">Kontakt (opcionalno)</label><input id="txt-contact" type="text" placeholder="@instagram" class="input py-2 text-xs"></div>
                                        <div class="flex justify-center scale-75"><div id="recaptcha-element"></div></div>
                                        <button type="submit" class="w-full bg-rose-600 py-3 rounded-xl font-black text-[11px] uppercase tracking-widest shadow-lg hover:bg-rose-500 transition-colors">Pošalji</button>
                                    </form>
                                </div>
                            </div>
                        `}
                        <div id="feed-header" class="flex items-center gap-3 mb-6 opacity-30">
                            <div class="h-[1px] bg-white/20 flex-1"></div>
                            <span class="text-[9px] font-black uppercase tracking-[0.3em]">Timeline</span>
                            <div id="active-filter-info"></div>
                            <div class="h-[1px] bg-white/20 flex-1"></div>
                        </div>
                        <div id="feed" class="space-y-4"></div>
                    </main>
                    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest opacity-0 translate-y-5 transition-all duration-300 z-[100] shadow-2xl"></div>
                </div>`;
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            if (!t) return; t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-5');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-5'), 3000);
        }

        let logoClicks = 0; let clickTimer = null;
        window.triggerAdminLogin = async () => {
            logoClicks++; clearTimeout(clickTimer);
            if (logoClicks >= 5) {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                if (!ADMIN_EMAILS.includes(result.user.email)) await signOut(auth);
            }
            clickTimer = setTimeout(() => { logoClicks = 0; }, 800);
        };

        window.onload = () => { renderUI(); };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020203; margin: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .gradient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at 50% 0%, #1a1a3a 0%, #020203 80%); }
        .card { border-width: 1px; border-radius: 1rem; border-color: rgba(255,255,255,0.08); backdrop-filter: blur(20px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6); }
        .input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.75rem; padding: 0.7rem 0.9rem; color: white; font-size: 13px; outline: none; transition: 0.2s; }
        .input:focus { border-color: #e11d48; background: rgba(255,255,255,0.07); }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        select option { background: #0a0a0a; color: white; }
    </style>
</head>
<body><div id="root"></div></body>
</html>
