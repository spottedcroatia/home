<!DOCTYPE html>
<html lang="hr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5FQ7GTQQ');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotted Croatia | Pronađi osobu koja ti je zapela za oko!</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/hearts.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/hearts.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const _part1 = "AIzaSyDUWCPiZQX";
        const _part2 = "9Evpkith3oKrI3yvb_x5aubw";

        const firebaseConfig = {
            apiKey: _part1 + _part2,
            authDomain: "spotted-croatia.firebaseapp.com",
            projectId: "spotted-croatia",
            storageBucket: "spotted-croatia.firebasestorage.app",
            messagingSenderId: "344590523147",
            appId: "1:344590523147:web:c9c8eaa976f386a384600e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'project-344590523147'; 
        const ADMIN_EMAILS = ['spottedcroatiadevs@gmail.com', 'reeshof5047@gmail.com']; 
        const GRADOVI = ['Split', 'Zagreb', 'Zadar', 'Dubrovnik', 'Šibenik', 'Slavonski Brod', 'Pula', 'Rijeka', 'Osijek', 'Varaždin', 'Karlovac', 'Ostalo'];

        let currentUser = null;
        let isAdmin = false;
        let allPostsCached = [];
        let activeFilter = null;
        let captchaWidgetId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                isAdmin = user.email && ADMIN_EMAILS.includes(user.email);
                renderUI();
                listenForPosts();
            } else {
                signInAnonymously(auth);
            }
        });

        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'posts');

        function listenForPosts() {
            onSnapshot(getCollectionRef(), (snap) => {
                allPostsCached = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                updateDisplay();
            });
        }

        function getTimeStyles(ts) {
            if (!ts) return "from-slate-900 to-black border-white/5";
            const hour = new Date(ts.seconds * 1000).getHours();
            if (hour >= 5 && hour < 10) return "from-orange-500/10 via-rose-500/5 to-transparent border-orange-500/20";
            if (hour >= 10 && hour < 17) return "from-blue-500/10 via-cyan-500/5 to-transparent border-blue-400/20";
            if (hour >= 17 && hour < 21) return "from-indigo-600/20 via-purple-500/10 to-transparent border-indigo-400/20";
            return "from-slate-900 via-blue-900/10 to-transparent border-blue-900/30";
        }

        function formatDate(ts) {
            if (!ts) return 'Upravo';
            const date = new Date(ts.seconds * 1000);
            return date.toLocaleString('hr-HR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function renderFeed(posts) {
            const container = document.getElementById('feed');
            if (!container) return;
            container.innerHTML = posts.map(p => {
                const timeStyles = getTimeStyles(p.timestamp);
                return `
                <div class="card p-5 md:p-7 mb-5 animate-slide-up relative bg-gradient-to-br ${timeStyles}">
                    ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="absolute top-2 right-2 bg-rose-600/20 hover:bg-rose-600 text-[7px] font-black p-1.5 rounded-lg transition-all z-20">X</button>` : ''}
                    
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-5">
                        <div class="flex items-center gap-2">
                            <button onclick="setFilter('${p.grad}')" class="bg-white/10 border border-white/10 px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-wider hover:bg-rose-600 transition-all">
                                ${p.grad}
                            </button>
                            <span class="text-white/20">•</span>
                            <span class="text-[10px] text-white/70 font-bold uppercase tracking-tight truncate max-w-[150px] md:max-w-none">
                                ${p.location}
                            </span>
                        </div>
                        <span class="text-[8px] text-white/30 font-mono ml-auto">${formatDate(p.timestamp)}</span>
                    </div>

                    <p class="text-white/95 font-medium text-[16px] md:text-lg leading-relaxed mb-6">"${p.text}"</p>
                    
                    ${p.contact ? `
                        <div class="pt-4 border-t border-white/5 flex items-center text-[9px] text-emerald-400 font-black uppercase tracking-widest">
                            <svg class="w-3 h-3 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            ${p.contact}
                        </div>
                    ` : ''}
                </div>`;
            }).join('') || `<div class="text-center py-20 text-white/10 text-xs font-bold uppercase tracking-widest">Nema objava...</div>`;
        }

        // --- Ostale funkcije ostaju iste kao u originalu ---
        window.updateDisplay = () => {
            const approved = allPostsCached.filter(p => p.status === 'approved');
            const pending = allPostsCached.filter(p => p.status === 'pending');
            const toShow = activeFilter ? approved.filter(p => p.grad === activeFilter) : approved;
            renderFeed(toShow);
            if (isAdmin) renderAdminPanel(pending);
            updateFilterUI();
        };

        window.setFilter = (grad) => {
            activeFilter = grad;
            window.updateDisplay();
            if (grad) document.getElementById('feed-header').scrollIntoView({ behavior: 'smooth' });
        };

        function updateFilterUI() {
            const info = document.getElementById('active-filter-info');
            if (info) info.innerHTML = activeFilter ? `<button onclick="setFilter(null)" class="ml-2 bg-rose-600 text-[8px] px-2 py-0.5 rounded font-black hover:bg-white hover:text-black transition-colors">PONIŠTI ${activeFilter}</button>` : '';
        }

        window.toggleForm = () => {
            const f = document.getElementById('form-container');
            const b = document.getElementById('toggle-btn');
            const isHidden = f.classList.contains('hidden');
            f.classList.toggle('hidden');
            b.innerText = isHidden ? "Zatvori" : "Objavi";
            if (isHidden && typeof grecaptcha !== 'undefined') {
                setTimeout(() => {
                    const captchaElement = document.getElementById('recaptcha-element');
                    if (captchaElement && captchaElement.innerHTML === "") {
                        captchaWidgetId = grecaptcha.render('recaptcha-element', { 'sitekey': '6Legi88sAAAAAOJj1zvesrRPas1wutu4-LQ6BRp9', 'theme': 'dark' });
                    }
                }, 100);
            }
        };

        window.handlePostSubmit = async (e) => {
            e.preventDefault();
            const captchaResponse = grecaptcha.getResponse(captchaWidgetId);
            if (!captchaResponse) { notify("Potvrdite da niste robot."); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerText = "Slanje...";
            try {
                await addDoc(getCollectionRef(), {
                    text: document.getElementById('txt-desc').value,
                    grad: document.getElementById('sel-grad').value,
                    location: document.getElementById('txt-loc').value,
                    contact: document.getElementById('txt-contact').value,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                e.target.reset(); grecaptcha.reset(captchaWidgetId);
                notify("Poslano na pregled! ✨"); window.toggleForm();
            } catch (err) { notify("Greška."); } finally { btn.disabled = false; btn.innerText = "Pošalji na pregled"; }
        };

        window.deletePost = async (id) => {
            if(confirm("Izbrisati?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id));
                notify("Obrisano.");
            }
        };

        window.approvePost = async (id) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id), { status: 'approved' });
            notify("Odobreno.");
        };

        function renderAdminPanel(pending) {
            const container = document.getElementById('admin-queue');
            if (!container) return;
            container.innerHTML = pending.map(p => `
                <div class="bg-white/5 p-4 rounded-3xl mb-3 border border-white/10">
                    <p class="text-xs text-white/80 mb-3">"${p.text}"</p>
                    <div class="flex gap-2">
                        <button onclick="approvePost('${p.id}')" class="flex-1 bg-emerald-600 text-white text-[10px] font-black py-2 rounded-xl">ODOBRI</button>
                        <button onclick="deletePost('${p.id}')" class="bg-rose-600 text-white p-2 px-4 rounded-xl text-[10px] font-black">X</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-white/10 text-[10px] py-4">Nema novih zahtjeva</p>';
        }

        function renderUI() {
            document.getElementById('root').innerHTML = `
                <div class="min-h-screen relative overflow-x-hidden text-white pb-20">
                    <div class="gradient-bg"></div>
                    <nav class="fixed top-0 inset-x-0 h-16 bg-black/60 backdrop-blur-3xl border-b border-white/5 z-50 flex items-center">
                        <div class="max-w-xl mx-auto px-6 w-full flex justify-between items-center">
                            <h1 onclick="triggerAdminLogin()" class="text-lg font-black tracking-tighter cursor-pointer">
                                SPOTTED<span class="text-rose-600">.</span>hr
                            </h1>
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] font-bold text-emerald-500 uppercase tracking-widest">Live</span>
                                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                            </div>
                        </div>
                    </nav>
                    <main class="relative max-w-xl mx-auto px-4 md:px-6 pt-24 z-10">
                        ${isAdmin ? `<section class="card p-6 mb-10 border-rose-500/30 bg-rose-500/10"><h3 class="text-[10px] font-black text-rose-500 uppercase mb-4 tracking-widest">Moderacija</h3><div id="admin-queue"></div></section>` : `
                            <div class="flex flex-col items-center mb-10">
                                <button id="toggle-btn" onclick="toggleForm()" class="bg-white text-black font-black py-4 px-14 rounded-full uppercase tracking-[0.2em] text-[10px] transition-all active:scale-95 shadow-2xl hover:scale-105">Objavi</button>
                                <div id="form-container" class="hidden w-full mt-8 card p-5 md:p-8 border-white/10 bg-black/40">
                                    <form onsubmit="handlePostSubmit(event)" class="space-y-6">
                                        <div class="space-y-2"><label class="label">Koga tražiš?</label><textarea id="txt-desc" placeholder="Opis osobe..." class="input min-h-[120px]" required></textarea></div>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div class="space-y-2"><label class="label">Grad</label><select id="sel-grad" class="input">${GRADOVI.map(g => `<option value="${g}">${g}</option>`).join('')}</select></div>
                                            <div class="space-y-2"><label class="label">Točna lokacija</label><input id="txt-loc" type="text" placeholder="Npr. Riva, Trg..." class="input" required></div>
                                        </div>
                                        <div class="space-y-2"><label class="label">Tvoj kontakt (opcionalno)</label><input id="txt-contact" type="text" placeholder="@insta ili mob" class="input"></div>
                                        <div class="flex justify-center py-2 overflow-hidden"><div id="recaptcha-element"></div></div>
                                        <button type="submit" class="w-full bg-rose-600 text-white font-black py-4 rounded-full uppercase tracking-widest text-[10px] hover:bg-rose-500 transition-all">Pošalji</button>
                                    </form>
                                </div>
                            </div>
                        `}
                        <div id="feed-header" class="flex items-center gap-4 mb-8">
                            <div class="h-[1px] bg-gradient-to-r from-transparent to-white/10 flex-1"></div>
                            <span class="text-[9px] font-black tracking-[0.5em] uppercase text-white/30">Zadnje objave</span>
                            <div id="active-filter-info"></div>
                            <div class="h-[1px] bg-gradient-to-l from-transparent to-white/10 flex-1"></div>
                        </div>
                        <div id="feed"></div>
                    </main>
                    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-4 rounded-full text-[10px] font-black uppercase tracking-widest opacity-0 translate-y-10 transition-all duration-500 z-[100] shadow-2xl w-[90%] md:w-auto text-center"></div>
                </div>`;
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            if (!t) return; t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        }

        let logoClicks = 0; let clickTimer = null;
        window.triggerAdminLogin = async () => {
            logoClicks++; clearTimeout(clickTimer);
            if (logoClicks >= 5) {
                logoClicks = 0;
                try {
                    const result = await signInWithPopup(auth, new GoogleAuthProvider());
                    if (!ADMIN_EMAILS.includes(result.user.email)) { notify("Pristup odbijen."); await signOut(auth); }
                } catch (e) {}
                return;
            }
            clickTimer = setTimeout(() => { logoClicks = 0; }, 800);
        };

        window.onload = () => { renderUI(); };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; -webkit-font-smoothing: antialiased; margin: 0; }
        .gradient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: linear-gradient(125deg, #050505, #0a0a0f, #1a0a0a, #050505); background-size: 400% 400%; animation: gradientMove 15s ease infinite; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card { border-width: 1px; border-radius: 1.5rem; border-color: rgba(255,255,255,0.05); backdrop-filter: blur(20px); transition: 0.3s; }
        .input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.25rem; padding: 1.1rem 1.5rem; color: white; font-size: 14px; outline: none; transition: 0.3s; }
        .input:focus { border-color: #e11d48; background: rgba(255,255,255,0.07); }
        .label { font-size: 8px; font-weight: 800; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-left: 1.2rem; display: block; letter-spacing: 0.15em; }
        .animate-slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #recaptcha-element { transform: scale(0.8); transform-origin: center; min-height: 70px; }
    </style>
</head>
<body><div id="root"></div></body>
</html>
