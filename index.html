<!DOCTYPE html>
<html lang="hr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5FQ7GTQQ');</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotted Croatia | Pronađi osobu koja ti je zapela za oko!</title>
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="icon" href="https://fav.farm/❤️">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-color: #050505;
            --primary: #e11d48;
        }

        body { 
            background: var(--bg-color); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            margin: 0;
        }

        /* --- GRADIENT MORPHING BACKGROUND --- */
        .gradient-bg {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            background: var(--bg-color);
            overflow: hidden;
        }

        .g-container {
            width: 100%;
            height: 100%;
            filter: blur(80px);
        }

        .g-circle {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.6;
        }

        .c1 { background: radial-gradient(circle at center, rgba(225, 29, 72, 0.4) 0, rgba(225, 29, 72, 0) 50%); top: -10%; left: -10%; animation: morph 15s infinite alternate; }
        .c2 { background: radial-gradient(circle at center, rgba(147, 51, 234, 0.3) 0, rgba(147, 51, 234, 0) 50%); bottom: -10%; right: -10%; animation: morph 12s infinite alternate-reverse; }
        .c3 { background: radial-gradient(circle at center, rgba(30, 64, 175, 0.3) 0, rgba(30, 64, 175, 0) 50%); top: 40%; left: 30%; animation: morph 18s infinite linear; }

        @keyframes morph {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.1); }
            100% { transform: translate(-5%, -10%) scale(0.9); }
        }

        /* --- UI STYLES --- */
        .card { border-radius: 2rem; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
        .input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; color: white; transition: all 0.3s; }
        .input:focus { border-color: var(--primary); outline: none; background: rgba(255,255,255,0.1); }
        .tag { font-size: 8px; background: rgba(225,29,72,0.15); color: #fb7185; padding: 4px 10px; border-radius: 99px; font-weight: 800; text-transform: uppercase; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .admin-glow { animation: admin-pulse 2s infinite alternate; }
        @keyframes admin-pulse { from { border-color: rgba(225,29,72,0.2); } to { border-color: rgba(225,29,72,0.6); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUWCPiZQX9Evpkith3oKrI3yvb_x5aubw",
            authDomain: "spotted-croatia.firebaseapp.com",
            projectId: "spotted-croatia",
            storageBucket: "spotted-croatia.firebasestorage.app",
            messagingSenderId: "344590523147",
            appId: "1:344590523147:web:c9c8eaa976f386a384600e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'project-344590523147'; 
        const ADMIN_EMAILS = ['spottedcroatiadevs@gmail.com', 'reeshof5047@gmail.com']; 
        const GRADOVI = ['Split', 'Zagreb', 'Zadar', 'Dubrovnik', 'Šibenik', 'Slavonski Brod', 'Pula', 'Rijeka', 'Osijek', 'Varaždin', 'Karlovac', 'Ostalo'];

        let currentUser = null;
        let isAdmin = false;
        let allPostsCached = [];
        let logoClicks = 0;
        let showAdminView = false;
        let captchaWidgetId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            isAdmin = user && user.email && ADMIN_EMAILS.includes(user.email);
            if (!user) signInAnonymously(auth);
            renderUI();
            listenForPosts();
        });

        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'posts');

        function listenForPosts() {
            onSnapshot(getCollectionRef(), (snap) => {
                allPostsCached = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                updateDisplay();
            });
        }

        // --- GLOBAL ACTIONS ---
        window.handleLogoClick = () => {
            logoClicks++;
            if (logoClicks >= 5) {
                logoClicks = 0;
                if (isAdmin) {
                    showAdminView = !showAdminView;
                    renderUI();
                    updateDisplay();
                } else {
                    signInWithPopup(auth, new GoogleAuthProvider());
                }
            }
        };

        window.toggleForm = () => {
            const f = document.getElementById('form-container');
            const b = document.getElementById('toggle-btn');
            f.classList.toggle('hidden');
            if (!f.classList.contains('hidden')) {
                setTimeout(() => {
                    const container = document.getElementById('recaptcha-container');
                    container.innerHTML = "";
                    captchaWidgetId = grecaptcha.render('recaptcha-container', {
                        'sitekey': '6Legi88sAAAAAOJj1zvesrRPas1wutu4-LQ6BRp9',
                        'theme': 'dark'
                    });
                }, 100);
            }
            b.innerText = f.classList.contains('hidden') ? "Objavi" : "Zatvori";
        };

        window.handlePostSubmit = async (e) => {
            e.preventDefault();
            const response = grecaptcha.getResponse(captchaWidgetId);
            if (!response) return alert("Potvrdite da niste robot!");

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerText = "Slanje...";
            
            try {
                await addDoc(getCollectionRef(), {
                    text: document.getElementById('txt-desc').value,
                    grad: document.getElementById('sel-grad').value,
                    location: document.getElementById('txt-loc').value,
                    contact: document.getElementById('txt-contact').value,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                e.target.reset();
                grecaptcha.reset(captchaWidgetId);
                notify("Poslano na pregled! ✨");
                window.toggleForm();
            } catch (err) { notify("Greška pri slanju."); }
            finally { btn.disabled = false; btn.innerText = "Pošalji na pregled"; }
        };

        window.approvePost = async (id) => {
            await updateDoc(doc(getCollectionRef(), id), { status: 'approved' });
            notify("Odobreno!");
        };

        window.deletePost = async (id) => {
            if(confirm("Obriši objavu?")) {
                await deleteDoc(doc(getCollectionRef(), id));
                notify("Obrisano.");
            }
        };

        window.updateDisplay = () => {
            const feed = document.getElementById('feed');
            if (!feed) return;

            if (showAdminView && isAdmin) {
                const pending = allPostsCached.filter(p => p.status === 'pending');
                feed.innerHTML = `
                    <div class="mb-8 border-l-4 border-rose-600 pl-4 py-2">
                        <h2 class="text-2xl font-black italic uppercase">Live Admin Panel</h2>
                        <p class="text-[10px] text-white/40 tracking-[0.2em] uppercase">Čeka na pregled: ${pending.length}</p>
                    </div>
                ` + pending.map(p => `
                    <div class="card p-6 mb-4 bg-white/5 admin-glow">
                        <p class="text-white/80 mb-4 italic">"${p.text}"</p>
                        <div class="flex gap-2">
                            <button onclick="approvePost('${p.id}')" class="bg-rose-600 text-[10px] font-bold px-6 py-2 rounded-full uppercase">Odobri</button>
                            <button onclick="deletePost('${p.id}')" class="bg-white/10 text-[10px] font-bold px-6 py-2 rounded-full uppercase hover:bg-white/20 transition-all">Obriši</button>
                        </div>
                    </div>
                `).join('') || '<p class="opacity-30 text-center py-20 italic">Sve objave su pregledane.</p>';
            } else {
                const approved = allPostsCached.filter(p => p.status === 'approved');
                feed.innerHTML = approved.map(p => `
                    <div class="card p-7 mb-6 animate-slide-up bg-white/5 border-white/5">
                        <div class="flex justify-between items-center mb-4">
                            <span class="tag">#${p.grad}</span>
                            <span class="text-[9px] text-white/20">${p.timestamp ? new Date(p.timestamp.seconds * 1000).toLocaleDateString() : 'Upravo sad'}</span>
                        </div>
                        <p class="text-lg leading-relaxed text-white/90">"${p.text}"</p>
                        <div class="mt-6 flex justify-between items-center border-t border-white/5 pt-4">
                            <div class="text-[10px] text-white/40 uppercase font-black tracking-widest">📍 ${p.location}</div>
                            ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="text-[9px] text-rose-500 font-bold hover:underline">OBRIŠI</button>` : ''}
                        </div>
                    </div>
                `).join('') || '<div class="text-center py-20 opacity-20">Nema aktivnih objava...</div>';
            }
        };

        function renderUI() {
            document.getElementById('root').innerHTML = `
                <div class="gradient-bg"><div class="g-container"><div class="g-circle c1"></div><div class="g-circle c2"></div><div class="g-circle c3"></div></div></div>
                
                <div class="min-h-screen">
                    <nav class="h-20 flex items-center justify-between px-8 sticky top-0 bg-black/20 backdrop-blur-md z-50 border-b border-white/5">
                        <h1 onclick="handleLogoClick()" class="text-xl font-black tracking-tighter cursor-pointer select-none">
                            SPOTTED<span class="text-rose-600">.</span>hr
                        </h1>
                        ${isAdmin ? '<span class="text-[8px] bg-rose-600 px-2 py-1 rounded-sm font-bold uppercase tracking-widest">Admin Active</span>' : ''}
                    </nav>

                    <main class="max-w-xl mx-auto px-6 py-12">
                        ${!showAdminView ? `
                        <div class="flex flex-col items-center mb-16">
                            <button id="toggle-btn" onclick="toggleForm()" class="bg-white text-black font-black py-4 px-16 rounded-full uppercase tracking-widest text-[11px] shadow-2xl hover:scale-105 active:scale-95 transition-all">Objavi</button>
                            <div id="form-container" class="hidden w-full mt-8 card p-8 bg-white/5">
                                <form onsubmit="handlePostSubmit(event)" class="space-y-5">
                                    <textarea id="txt-desc" placeholder="Koga tražiš?" class="input min-h-[120px]" required></textarea>
                                    <div class="grid grid-cols-2 gap-4">
                                        <select id="sel-grad" class="input">${GRADOVI.map(g => `<option value="${g}">${g}</option>`).join('')}</select>
                                        <input id="txt-loc" type="text" placeholder="Lokacija (npr. Riva)" class="input" required>
                                    </div>
                                    <input id="txt-contact" type="text" placeholder="Kontakt (Insta, mob...)" class="input">
                                    <div class="flex justify-center" id="recaptcha-container"></div>
                                    <button type="submit" class="w-full bg-rose-600 py-4 rounded-full font-black uppercase text-[11px] tracking-widest">Pošalji na pregled</button>
                                </form>
                            </div>
                        </div>
                        ` : `
                        <div class="text-center mb-10"><button onclick="handleLogoClick()" class="text-[10px] opacity-40 uppercase tracking-widest hover:opacity-100 transition-all underline">Zatvori Admin Panel</button></div>
                        `}
                        <div id="feed"></div>
                    </main>
                    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-4 rounded-full text-[10px] font-black opacity-0 transition-all z-[100] shadow-2xl pointer-events-none"></div>
                </div>`;
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        window.onload = renderUI;
    </script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
