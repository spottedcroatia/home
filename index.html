<!DOCTYPE html>
<html lang="hr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5FQ7GTQQ');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotted Croatia | Pronađi osobu koja ti je zapela za oko!</title>
    <meta name="description" content="Tražiš nekoga iz Zagreba, Splita, Rijeke ili Osijeka? Spotted Croatia ti pomaže pronaći tajanstvenu osobu koju si sreo/la u gradu ili kafiću.">
    <meta name="keywords" content="spotted croatia, spotted zagreb, spotted split, upoznavanje, hrvatska, ljubav, kafići">
    
    <link rel="icon" href="https://fav.farm/❤️">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const _part1 = "AIzaSyDUWCPiZQX";
        const _part2 = "9Evpkith3oKrI3yvb_x5aubw";

        const firebaseConfig = {
            apiKey: _part1 + _part2,
            authDomain: "spotted-croatia.firebaseapp.com",
            projectId: "spotted-croatia",
            storageBucket: "spotted-croatia.firebasestorage.app",
            messagingSenderId: "344590523147",
            appId: "1:344590523147:web:c9c8eaa976f386a384600e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'project-344590523147'; 
        const ADMIN_EMAILS = ['spottedcroatiadevs@gmail.com', 'reeshof5047@gmail.com']; 
        const GRADOVI = ['Split', 'Zagreb', 'Zadar', 'Dubrovnik', 'Šibenik', 'Slavonski Brod', 'Pula', 'Rijeka', 'Osijek', 'Varaždin', 'Karlovac', 'Ostalo'];

        let currentUser = null;
        let isAdmin = false;
        let allPostsCached = [];
        let activeFilter = null;
        let captchaWidgetId = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                isAdmin = user.email && ADMIN_EMAILS.includes(user.email);
                renderUI();
                listenForPosts();
            } else {
                signInAnonymously(auth);
            }
        });

        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'posts');

        function listenForPosts() {
            onSnapshot(getCollectionRef(), (snap) => {
                allPostsCached = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                updateDisplay();
            });
        }

        function getTimeStyles(ts) {
            if (!ts) return "from-white to-rose-50/30 border-black/5";
            const hour = new Date(ts.seconds * 1000).getHours();
            // Jutro (5h - 10h)
            if (hour >= 5 && hour < 10) return "from-orange-100/60 to-rose-50/40 border-orange-200/50";
            // Dan (10h - 17h)
            if (hour >= 10 && hour < 17) return "from-blue-50/80 to-white border-blue-100/50";
            // Večer (17h - 21h)
            if (hour >= 17 && hour < 21) return "from-purple-100/50 to-indigo-50/30 border-purple-200/40";
            // Noć (21h - 5h)
            return "from-slate-800/5 to-slate-200/20 border-slate-300/30";
        }

        function formatDate(ts) {
            if (!ts) return 'Upravo sada';
            const date = new Date(ts.seconds * 1000);
            return date.toLocaleString('hr-HR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderFeed(posts) {
            const container = document.getElementById('feed');
            if (!container) return;
            container.innerHTML = posts.map(p => {
                const timeStyles = getTimeStyles(p.timestamp);
                return `
                <div class="card p-7 mb-6 animate-slide-up relative bg-gradient-to-br ${timeStyles}">
                    ${isAdmin ? `<button onclick="deletePost('${p.id}')" class="absolute top-4 right-4 bg-rose-600/10 hover:bg-rose-600 hover:text-white text-rose-600 text-[8px] font-black p-2 rounded-lg transition-all">OBRIŠI</button>` : ''}
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex flex-wrap gap-2">
                            <span class="tag">#Spotted</span>
                            <button onclick="setFilter('${p.grad}')" class="bg-black/5 border border-black/5 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider hover:bg-black hover:text-white transition-all">
                                📍 ${p.grad}
                            </button>
                        </div>
                        <span class="text-[9px] text-gray-400 font-mono">${formatDate(p.timestamp)}</span>
                    </div>
                    <p class="text-gray-900 font-medium text-lg leading-relaxed mb-8">"${p.text}"</p>
                    <div class="flex flex-wrap gap-5 pt-5 border-t border-black/5 items-center">
                        <div class="flex items-center text-[10px] text-gray-500 uppercase tracking-widest font-bold">
                            <span class="w-1.5 h-1.5 bg-rose-500 rounded-full mr-2 shadow-[0_0_8px_rgba(244,63,94,0.4)]"></span>
                            ${p.location}
                        </div>
                        ${p.contact ? `
                            <div class="flex items-center text-[10px] text-emerald-600 font-black uppercase tracking-tighter">
                                <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                ${p.contact}
                            </div>
                        ` : ''}
                    </div>
                </div>`;
            }).join('') || `<div class="text-center py-20 text-black/10 text-xs font-bold uppercase tracking-widest">Nema objava...</div>`;
        }

        window.updateDisplay = () => {
            const approved = allPostsCached.filter(p => p.status === 'approved');
            const pending = allPostsCached.filter(p => p.status === 'pending');
            const toShow = activeFilter ? approved.filter(p => p.grad === activeFilter) : approved;
            renderFeed(toShow);
            if (isAdmin) renderAdminPanel(pending);
            updateFilterUI();
        };

        window.setFilter = (grad) => {
            activeFilter = grad;
            window.updateDisplay();
            if (grad) document.getElementById('feed-header').scrollIntoView({ behavior: 'smooth' });
        };

        function updateFilterUI() {
            const info = document.getElementById('active-filter-info');
            if (info) info.innerHTML = activeFilter ? `<button onclick="setFilter(null)" class="ml-2 bg-rose-600 text-white text-[8px] px-2 py-0.5 rounded font-black hover:bg-black transition-colors">PONIŠTI ${activeFilter}</button>` : '';
        }

        window.toggleForm = () => {
            const f = document.getElementById('form-container');
            const b = document.getElementById('toggle-btn');
            const isHidden = f.classList.contains('hidden');
            f.classList.toggle('hidden');
            b.innerText = isHidden ? "Zatvori" : "Objavi";

            if (isHidden && typeof grecaptcha !== 'undefined') {
                setTimeout(() => {
                    const captchaElement = document.getElementById('recaptcha-element');
                    if (captchaElement && captchaElement.innerHTML === "") {
                        captchaWidgetId = grecaptcha.render('recaptcha-element', {
                            'sitekey': '6Legi88sAAAAAOJj1zvesrRPas1wutu4-LQ6BRp9',
                            'theme': 'light'
                        });
                    }
                }, 100);
            }
        };

        window.handlePostSubmit = async (e) => {
            e.preventDefault();
            const captchaResponse = grecaptcha.getResponse(captchaWidgetId);
            if (!captchaResponse) { notify("Molimo potvrdite da niste robot."); return; }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true; btn.innerText = "Slanje...";
            
            try {
                await addDoc(getCollectionRef(), {
                    text: document.getElementById('txt-desc').value,
                    grad: document.getElementById('sel-grad').value,
                    location: document.getElementById('txt-loc').value,
                    contact: document.getElementById('txt-contact').value,
                    status: 'pending',
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                e.target.reset();
                grecaptcha.reset(captchaWidgetId);
                notify("Poslano na pregled! ✨");
                window.toggleForm();
            } catch (err) { notify("Greška pri slanju."); } 
            finally { btn.disabled = false; btn.innerText = "Pošalji na pregled"; }
        };

        window.deletePost = async (id) => {
            if(confirm("Izbrisati objavu?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id));
                notify("Obrisano.");
            }
        };

        window.approvePost = async (id) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', id), { status: 'approved' });
            notify("Odobreno.");
        };

        function renderAdminPanel(pending) {
            const container = document.getElementById('admin-queue');
            if (!container) return;
            container.innerHTML = pending.map(p => `
                <div class="bg-black/5 p-4 rounded-3xl mb-3 border border-black/5">
                    <p class="text-xs text-gray-700 mb-3 italic">"${p.text}"</p>
                    <div class="flex gap-2">
                        <button onclick="approvePost('${p.id}')" class="flex-1 bg-emerald-600 text-white text-[10px] font-black py-2 rounded-xl">ODOBRI</button>
                        <button onclick="deletePost('${p.id}')" class="bg-rose-600 text-white p-2 px-4 rounded-xl text-[10px] font-black">X</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-gray-400 text-[10px] py-4 uppercase tracking-widest">Sve čisto</p>';
        }

        function renderUI() {
            document.getElementById('root').innerHTML = `
                <div class="gradient-bg">
                    <div class="blob blob-1"></div>
                    <div class="blob blob-2"></div>
                    <div class="blob blob-3"></div>
                </div>
                <div class="min-h-screen relative overflow-x-hidden pb-20">
                    <nav class="fixed top-0 inset-x-0 h-16 bg-white/70 backdrop-blur-3xl border-b border-black/5 z-50 flex items-center">
                        <div class="max-w-xl mx-auto px-6 w-full flex justify-between items-center">
                            <h1 onclick="triggerAdminLogin()" class="text-lg font-black tracking-tighter cursor-pointer text-gray-900">
                                SPOTTED<span class="text-rose-600">.</span>hr
                            </h1>
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Live</span>
                                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                            </div>
                        </div>
                    </nav>

                    <main class="relative max-w-xl mx-auto px-6 pt-24 z-10">
                        ${isAdmin ? `<section class="card p-6 mb-10 border-rose-500/20 bg-rose-50/50"><h3 class="text-[10px] font-black text-rose-500 uppercase mb-4 tracking-widest">Moderacija</h3><div id="admin-queue"></div></section>` : `
                            <div class="flex flex-col items-center mb-12">
                                <button id="toggle-btn" onclick="toggleForm()" class="bg-gray-900 text-white font-black py-4 px-14 rounded-full uppercase tracking-[0.2em] text-[10px] transition-all active:scale-95 shadow-xl hover:scale-105">Objavi</button>
                                <div id="form-container" class="hidden w-full mt-8 card p-8 bg-white/80 border-black/5 shadow-2xl">
                                    <form onsubmit="handlePostSubmit(event)" class="space-y-6">
                                        <div class="space-y-2"><label class="label">Koga tražiš?</label><textarea id="txt-desc" placeholder="Opis osobe..." class="input min-h-[120px]" required></textarea></div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div class="space-y-2"><label class="label">Grad</label><select id="sel-grad" class="input">${GRADOVI.map(g => `<option value="${g}">${g}</option>`).join('')}</select></div>
                                            <div class="space-y-2"><label class="label">Gdje točno?</label><input id="txt-loc" type="text" placeholder="Kafić, trg..." class="input" required></div>
                                        </div>
                                        <div class="space-y-2"><label class="label">Tvoj kontakt (opcionalno)</label><input id="txt-contact" type="text" placeholder="@instagram ili broj" class="input"></div>
                                        <div class="flex justify-center py-2"><div id="recaptcha-element"></div></div>
                                        <button type="submit" class="w-full bg-rose-600 text-white font-black py-4 rounded-full uppercase tracking-widest text-[10px] hover:bg-rose-500 transition-all">Pošalji na pregled</button>
                                    </form>
                                </div>
                            </div>
                        `}

                        <div id="feed-header" class="flex items-center gap-4 mb-8">
                            <div class="h-[1px] bg-black/5 flex-1"></div>
                            <span class="text-[9px] font-black tracking-[0.5em] uppercase text-gray-400">Najnovije objave</span>
                            <div id="active-filter-info"></div>
                            <div class="h-[1px] bg-black/5 flex-1"></div>
                        </div>

                        <div id="feed"></div>
                    </main>

                    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-full text-[10px] font-black uppercase tracking-widest opacity-0 translate-y-10 transition-all duration-500 z-[100] shadow-2xl"></div>
                </div>`;
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        }

        let logoClicks = 0;
        let clickTimer = null;
        window.triggerAdminLogin = async () => {
            logoClicks++;
            clearTimeout(clickTimer);
            if (logoClicks >= 5) {
                logoClicks = 0;
                try {
                    const result = await signInWithPopup(auth, new GoogleAuthProvider());
                    if (!ADMIN_EMAILS.includes(result.user.email)) { notify("Nemaš admin pristup."); await signOut(auth); }
                } catch (e) {}
                return;
            }
            clickTimer = setTimeout(() => { logoClicks = 0; }, 800);
        };

        window.onload = () => { renderUI(); };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fff7ed; 
            color: #1a1a1a; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .gradient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #fff7ed;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; background: #fb7185; }
        .blob-2 { bottom: -10%; right: -10%; background: #38bdf8; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; background: #fbbf24; animation-delay: -10s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(100px, 50px) scale(1.1) rotate(90deg); }
            66% { transform: translate(-50px, 150px) scale(0.9) rotate(180deg); }
            100% { transform: translate(0, 0) scale(1) rotate(360deg); }
        }

        .card { 
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 2.5rem; 
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .card:hover { transform: translateY(-4px); box-shadow: 0 30px 60px -20px rgba(0,0,0,0.08); }

        .input { 
            width: 100%; 
            background: rgba(255,255,255,0.9); 
            border: 1px solid rgba(0,0,0,0.08); 
            border-radius: 1.25rem; 
            padding: 1.1rem 1.5rem; 
            color: #1a1a1a;
            font-size: 14px; 
            outline: none; 
            transition: 0.3s; 
        }
        .input:focus { border-color: #e11d48; background: white; box-shadow: 0 0 0 4px rgba(225,29,72,0.05); }

        .label { 
            font-size: 9px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: rgba(0,0,0,0.4); 
            margin-left: 1.2rem; 
            display: block; 
            letter-spacing: 0.1em; 
        }

        .tag { 
            font-size: 8px; 
            font-weight: 900; 
            text-transform: uppercase; 
            background: rgba(225, 29, 72, 0.08); 
            color: #e11d48; 
            padding: 5px 14px; 
            border-radius: 99px; 
            letter-spacing: 0.05em; 
        }

        .animate-slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fff7ed; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        #recaptcha-element { transform: scale(0.85); transform-origin: center; min-height: 78px; }
        @media (min-width: 400px) { #recaptcha-element { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
